version: "3.9"

services:
  # ─── Databases ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: retailflux
      POSTGRES_PASSWORD: retailflux_dev
      POSTGRES_DB: retailflux
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailflux"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: retailflux
      MONGO_INITDB_ROOT_PASSWORD: retailflux_dev
      MONGO_INITDB_DATABASE: retailflux
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Object Storage (MinIO — S3-compatible, free local) ───────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: retailflux
      MINIO_ROOT_PASSWORD: retailflux_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://retailflux:retailflux_dev@postgres:5432/retailflux
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      MONGODB_URL: mongodb://retailflux:retailflux_dev@mongodb:27017/retailflux?authSource=admin
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: retailflux
      MINIO_SECRET_KEY: retailflux_dev
      MINIO_USE_SSL: "false"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://retailflux:retailflux_dev@postgres:5432/retailflux
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      MONGODB_URL: mongodb://retailflux:retailflux_dev@mongodb:27017/retailflux?authSource=admin
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: retailflux
      MINIO_SECRET_KEY: retailflux_dev
      MINIO_USE_SSL: "false"
      ENVIRONMENT: development
    depends_on:
      - redis
      - postgres
      - mongodb
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  # ─── Celery Beat (scheduled tasks) ───────────────────────────────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      ENVIRONMENT: development
    depends_on:
      - redis
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ─── Frontend ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  minio_data:
  web_node_modules:
