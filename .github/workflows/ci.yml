name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy types-passlib types-python-jose
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/
      - run: mypy app/ --ignore-missing-imports

  api-test:
    name: API — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retailflux
          POSTGRES_PASSWORD: retailflux_dev
          POSTGRES_DB: retailflux
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://retailflux:retailflux_dev@localhost:5432/retailflux
        run: alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://retailflux:retailflux_dev@localhost:5432/retailflux
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          MONGODB_URL: mongodb://localhost:27017/retailflux_ci
          MONGODB_DATABASE: retailflux_ci
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml -k "not test_health_endpoint"

      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ─── Frontend ─────────────────────────────────────────────────────────────
  web-lint:
    name: Web — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    needs: web-lint
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://retailflux-api.onrender.com
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7
